name: Enforce prod source

on:
  pull_request:
    branches: [prod]

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow merges from main
        run: |
          if [ "${{ github.head_ref }}" != "main" ]; then
            echo "PRs to prod must come from main. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Source branch is main — OK"
