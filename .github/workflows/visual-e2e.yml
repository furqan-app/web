name: Visual e2e tests

# Visual regression suite — see docs/plans/visual-e2e-testing.md and ADR 0018.
# Soft-blocking PR check, not part of protect-prod.yml's hard branch-source rule.

on:
  pull_request:

jobs:
  visual-e2e:
    runs-on: ubuntu-latest
    services:
      quran-db-e2e:
        image: mysql:8.0
        ports:
          - 3309:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: furqan_quran_e2e
          MYSQL_USER: quran_user
          MYSQL_PASSWORD: quran_password
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpassword"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      app-db-e2e:
        image: mysql:8.0
        ports:
          - 3310:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: furqan_app_e2e
          MYSQL_USER: app_user
          MYSQL_PASSWORD: app_password
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpassword"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set up e2e databases
        run: npm run e2e:setup

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual e2e tests
        run: npm run e2e:test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (diff images)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
